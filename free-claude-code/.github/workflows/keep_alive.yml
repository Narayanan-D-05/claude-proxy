name: Keep Alive Render

on:
  schedule:
    - cron: '*/12 * * * *' # Runs every 12 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Proxy
        run: |
          curl -s https://claude-proxy-1zpk.onrender.com/health
